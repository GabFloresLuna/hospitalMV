spring.application.name=hospitalVM

#datasource (Fuente de datos)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/hospital_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:flores}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:serolf}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration