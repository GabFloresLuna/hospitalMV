services:
  db:
    image: mariadb:10.11
    container_name: hospital-mariadb-container
    environment:
      - MARIADB_ROOT_PASSWORD=serolf
      - MARIADB_DATABASE=hospital_db
      - MARIADB_USER=flores
      - MARIADB_PASSWORD=serolf
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
volumes:
  mariadb_data:
    
